name: CI
on: [push, pull_request]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Lockfile drift gate
        # C4-9 / review P2.26: pyproject <-> uv.lock drift fails CI here,
        # before anything installs.
        run: uv lock --check

      - name: Install dependencies
        # Reproducible install straight from the committed lockfile into the
        # project venv. Every gate below runs inside it via `uv run --frozen`
        # (no re-resolution, no lock mutation mid-run).
        run: uv sync --frozen --extra dev

      - name: Lint
        run: uv run --frozen ruff check src/ tests/ scripts/

      - name: Format check
        run: uv run --frozen ruff format --check src/ tests/ scripts/

      - name: Type check
        # Blocking since review P2.24. The env-sensitivity that kept this
        # advisory (a transitively-installed types-PyYAML would flip the yaml
        # import-untyped ignore to "unused" under warn_unused_ignores) is gone:
        # the lockfile pins the resolution and types-PyYAML is not in it, so CI
        # installs exactly the environment mypy was verified against.
        run: uv run --frozen mypy src/gridflow/

      - name: Test
        run: uv run --frozen pytest tests/ -v --tb=short -x -m "not live"
