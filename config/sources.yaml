        endpoint: "/datasets/NETBSAD"
        schedule: "daily"
        max_query_days: 1
      ndf:
        endpoint: "/datasets/NDF"
        schedule: "daily"
        max_query_days: 1
      ndfd:
        endpoint: "/datasets/NDFD"
        schedule: "daily"
        max_query_days: 1
      pn:
        endpoint: "/datasets/PN"
        schedule: "hourly"
        max_query_days: 1
      melngc:
        endpoint: "/datasets/MELNGC"
        schedule: "hourly"
        max_query_days: 1
      fou2t14d:
        endpoint: "/datasets/FOU2T14D"
        schedule: "daily"
        max_query_days: 1
      uou2t14d:
        endpoint: "/datasets/UOU2T14D"
        schedule: "daily"
        max_query_days: 1
      windfor:
        endpoint: "/datasets/WINDFOR"
        schedule: "hourly"
        max_query_days: 1
      temp:
