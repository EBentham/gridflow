sources:
  elexon:
    base_url: "https://data.elexon.co.uk/bmrs/api/v1"
    api_key_env: ""
    api_key_header: ""
    rate_limit_per_second: 2
    timeout: 30
    max_retries: 5
    datasets:
      system_prices:
        endpoint: "/balancing/settlement/system-prices"
        schedule: "hourly"
        max_query_days: 1
      boal:
        endpoint: "/datasets/BOAL"
        schedule: "hourly"
        max_query_days: 1
      bod:
        endpoint: "/datasets/BOD"
        schedule: "hourly"
        max_query_days: 1
