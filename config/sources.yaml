      nonbm:
        endpoint: "/datasets/NONBM"
        schedule: "daily"
        max_query_days: 1
      inddem:
        endpoint: "/datasets/INDDEM"
        schedule: "daily"
        max_query_days: 1
      indgen:
        endpoint: "/datasets/INDGEN"
        schedule: "daily"
        max_query_days: 1
      tsdf:
        endpoint: "/datasets/TSDF"
        schedule: "daily"
        max_query_days: 1
      tsdfd:
        endpoint: "/datasets/TSDFD"
