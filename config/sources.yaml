      bmunits_reference:
        endpoint: "/reference/bmunits/all"
        schedule: "weekly"
        max_query_days: 0

  open_meteo:
    base_url: "https://api.open-meteo.com/v1"
    api_key_env: ""
    api_key_header: ""
    rate_limit_per_second: 5
    timeout: 30
    max_retries: 3
    datasets:
      historical:
        endpoint: "archive"
        schedule: "daily"
        max_query_days: 30
      forecast:
        endpoint: "forecast"
        schedule: "hourly"
        max_query_days: 7

  entsoe:
    base_url: "https://web-api.tp.entsoe.eu"
    api_key_env: "ENTSOE_API_KEY"
    api_key_header: ""
    rate_limit_per_second: 6
    timeout: 60
    max_retries: 5
    datasets:
      day_ahead_prices:
        document_type: "A44"
        schedule: "daily"
        max_query_days: 365
      actual_load:
        document_type: "A65"
        process_type: "A16"
        schedule: "daily"
        max_query_days: 365
      load_forecast:
        document_type: "A65"
        process_type: "A01"
        schedule: "daily"
        max_query_days: 365
      actual_generation:
        document_type: "A75"
        process_type: "A16"
        schedule: "daily"
        max_query_days: 1
      wind_solar_forecast:
        document_type: "A69"
        process_type: "A01"
        schedule: "daily"
        max_query_days: 1
      cross_border_flows:
        document_type: "A88"
        schedule: "daily"
        max_query_days: 365
      outages_generation:
        document_type: "A80"
        schedule: "daily"
        max_query_days: 365
      installed_capacity:
        document_type: "A68"
        process_type: "A33"
        schedule: "weekly"
        max_query_days: 365

  gie_agsi:
    base_url: "https://agsi.gie.eu"
    api_key_env: "GIE_API_KEY"
    api_key_header: "x-key"
    rate_limit_per_second: 5
    timeout: 30
    max_retries: 3
    datasets:
      storage:
        endpoint: "/api"
        schedule: "daily"
        max_query_days: 30

  gie_alsi:
    base_url: "https://alsi.gie.eu"
    api_key_env: "GIE_API_KEY"
    api_key_header: "x-key"
    rate_limit_per_second: 5
    timeout: 30
    max_retries: 3
    datasets:
      lng:
        endpoint: "/api"
        schedule: "daily"
        max_query_days: 30

  entsog:
    base_url: "https://transparency.entsog.eu/api/v1"
    api_key_env: ""
    api_key_header: ""
    rate_limit_per_second: 5
    timeout: 30
    max_retries: 5
    datasets:
      physical_flows:
        endpoint: "/operationaldata"
        schedule: "daily"
        max_query_days: 30

  neso:
    base_url: "https://api.carbonintensity.org.uk"
    api_key_env: ""
    api_key_header: ""
    rate_limit_per_second: 10
    timeout: 30
    max_retries: 3
    datasets:
      carbon_intensity:
        endpoint: "/intensity"
        schedule: "hourly"
        max_query_days: 14
