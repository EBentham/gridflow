        schedule: "daily"
        max_query_days: 1
      uou2t14d:
        endpoint: "/datasets/UOU2T14D"
        schedule: "daily"
        max_query_days: 1
      windfor:
        endpoint: "/datasets/WINDFOR"
        schedule: "hourly"
        max_query_days: 1
      temp:
        endpoint: "/datasets/TEMP"
        schedule: "daily"
        max_query_days: 1
      # generation_by_fuel: removed — duplicate of fuelhh (both use /datasets/FUELHH)
      agpt:
